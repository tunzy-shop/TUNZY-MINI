<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TunzyMD Bot Manager</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="bg"></div>
    <div class="wrap">
        <div class="header">
            <div class="logo-circle">
                <img src="/images/my-logo.jpg" alt="TunzyMD Logo" class="logo-img">
            </div>
            <h1>TunzyMD</h1>
            <p class="sub">Login to manage your WhatsApp Bot</p>
        </div>

        <div class="card">
            <div class="card-title">🔐 LOGIN</div>
            <form id="loginForm">
                <label>Email Address</label>
                <div class="iw">
                    <span class="icon">📧</span>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                
                <label>Password</label>
                <div class="iw">
                    <span class="icon">🔒</span>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn" id="loginBtn">
                    <span>Login</span> <span>→</span>
                </button>
                <div class="err" id="errorMsg"></div>
            </form>
            
            <div class="register-link">
                Don't have an account? <a href="/register.html">Create Account</a>
            </div>
        </div>
        
        <div class="stats-row">
            <div class="stat-pill">🤖 <b id="stat-total">...</b> bots active</div>
            <div class="stat-pill">⚡ <b>100+</b> commands</div>
            <div class="stat-pill">🌍 <b>24/7</b> uptime</div>
        </div>
    </div>
    
    <script src="/js/main.js"></script>
    <script>
        // Check if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = '/dashboard.html';
        }
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMsg');
            
            btn.disabled = true;
            btn.innerHTML = '<div class="spin"></div><span>Logging in...</span>';
            errorDiv.style.display = 'none';
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(data.error || 'Login failed');
                }
                
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = '/dashboard.html';
                
            } catch (err) {
                errorDiv.textContent = '❌ ' + err.message;
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<span>Login</span> <span>→</span>';
            }
        });
        
        // Fetch stats
        fetch('/api/stats').then(r => r.json()).then(d => {
            document.getElementById('stat-total').textContent = d.active || 0;
        }).catch(() => {});
    </script>
</body>
</html>

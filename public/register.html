<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TunzyMD Bot Manager</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="bg"></div>
    <div class="wrap">
        <div class="header">
            <div class="logo-circle">
                <img src="/images/my-logo.jpg" alt="TunzyMD Logo" class="logo-img">
            </div>
            <h1>TunzyMD</h1>
            <p class="sub">Create your account to start using WhatsApp Bot</p>
        </div>

        <div class="card">
            <div class="card-title">📝 CREATE ACCOUNT</div>
            <form id="registerForm">
                <label>Username</label>
                <div class="iw">
                    <span class="icon">👤</span>
                    <input type="text" id="username" placeholder="Your username" required>
                </div>
                
                <label>Email Address</label>
                <div class="iw">
                    <span class="icon">📧</span>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                
                <label>Password</label>
                <div class="iw">
                    <span class="icon">🔒</span>
                    <input type="password" id="password" placeholder="At least 6 characters" required>
                </div>
                
                <label>Confirm Password</label>
                <div class="iw">
                    <span class="icon">✓</span>
                    <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                </div>
                
                <button type="submit" class="btn" id="registerBtn">
                    <span>Create Account</span> <span>→</span>
                </button>
                <div class="err" id="errorMsg"></div>
            </form>
            
            <div class="register-link">
                Already have an account? <a href="/login.html">Login here</a>
            </div>
        </div>
    </div>
    
    <script src="/js/main.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('registerBtn');
            const errorDiv = document.getElementById('errorMsg');
            
            if (password !== confirmPassword) {
                errorDiv.textContent = '❌ Passwords do not match!';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                errorDiv.textContent = '❌ Password must be at least 6 characters!';
                errorDiv.style.display = 'block';
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<div class="spin"></div><span>Creating account...</span>';
            errorDiv.style.display = 'none';
            
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(data.error || 'Registration failed');
                }
                
                // Auto login after registration
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = '/dashboard.html';
                
            } catch (err) {
                errorDiv.textContent = '❌ ' + err.message;
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<span>Create Account</span> <span>→</span>';
            }
        });
    </script>
</body>
</html>
